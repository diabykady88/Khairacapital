/* ================= PLANIFICATEUR INTELLIGENT DE DETTES =================
   Phase 1 : minimums partout, puis ramener chaque carte sous le seuil
   d'utilisation (taux les plus chers d'abord) — bon pour la cote.
   Phase 2 : avalanche pure (taux le plus élevé d'abord) — bon pour le portefeuille.
======================================================================== */
function planifierDettes(dettesIn, budget, seuil = 30) {
  let ds = dettesIn.map((d) => ({ ...d }));
  const serie = [{ m: 0, total: ds.reduce((s, d) => s + d.solde, 0) }];
  let totalInterets = 0, m = 0, moisSousSeuil = null, planMois1 = null, alerteMin = false;
  const dates = {};
  const historique = [];
  while (ds.some((d) => d.solde > 0.5) && m < 300) {
    m++;
    ds.forEach((d) => {
      if (d.solde > 0 && d.taux > 0) {
        const i = d.solde * (d.taux / 100 / 12);
        d.solde += i;
        totalInterets += i;
      }
    });
    const alloc = {};
    // Dettes hors budget (Hydro, téléphone…) : paiement fixe séparé
    ds.filter((d) => !d.dansBudget && d.solde > 0).forEach((d) => {
      const p = Math.min(d.solde, d.paiement || 0);
      d.solde -= p;
      alloc[d.id] = (alloc[d.id] || 0) + p;
    });
    // Budget cartes & marge : 1) minimums partout
    let pool = budget;
    ds.filter((d) => d.dansBudget && d.solde > 0).forEach((d) => {
      const min = Math.min(d.solde, d.minimum || 0);
      const p = Math.min(min, pool);
      if (p < min - 0.01) alerteMin = true;
      d.solde -= p;
      pool -= p;
      alloc[d.id] = (alloc[d.id] || 0) + p;
    });
    // 2) Phase 1 : cartes au-dessus du seuil, taux les plus élevés d'abord
    const surSeuil = ds
      .filter((d) => d.dansBudget && d.limite > 0 && d.solde / d.limite > seuil / 100)
      .sort((a, b) => b.taux - a.taux);
    for (const d of surSeuil) {
      if (pool <= 0) break;
      const cible = (seuil / 100) * d.limite;
      const p = Math.min(pool, Math.max(0, d.solde - cible));
      d.solde -= p;
      pool -= p;
      alloc[d.id] = (alloc[d.id] || 0) + p;
    }
    // 3) Phase 2 : avalanche
    const ordre = ds.filter((d) => d.dansBudget && d.solde > 0.5).sort((a, b) => b.taux - a.taux);
    for (const d of ordre) {
      if (pool <= 0) break;
      const p = Math.min(pool, d.solde);
      d.solde -= p;
      pool -= p;
      alloc[d.id] = (alloc[d.id] || 0) + p;
    }
    ds.forEach((d) => { if (d.solde <= 0.5 && !dates[d.id]) { d.solde = 0; dates[d.id] = m; } });
    if (moisSousSeuil === null && ds.filter((d) => d.dansBudget && d.limite > 0).every((d) => d.solde / d.limite <= seuil / 100 + 0.001)) moisSousSeuil = m;
    if (m === 1) planMois1 = alloc;
    if (m <= 60) historique.push({ m, alloc: { ...alloc }, restant: Math.max(0, ds.reduce((s, d) => s + Math.max(0, d.solde), 0)) });
    serie.push({ m, total: Math.max(0, ds.reduce((s, d) => s + Math.max(0, d.solde), 0)) });
  }
  return { serie, nbMois: m, totalInterets, dates, moisSousSeuil, planMois1, alerteMin, historique };
}
function budgetRequis(dettes, objectif, seuil) {
  if (planifierDettes(dettes, 20000, seuil).nbMois > objectif) return Infinity;
  let lo = 0, hi = 20000;
  for (let i = 0; i < 22; i++) {
    const mid = (lo + hi) / 2;
    if (planifierDettes(dettes, mid, seuil).nbMois <= objectif) hi = mid;
    else lo = mid;
  }
  return Math.ceil(hi / 5) * 5;
}

const prochaineOccurrence = (jour) => {
  if (!jour || jour < 1) return null;
  const t = new Date(); t.setHours(0, 0, 0, 0);
  const construire = (an, mois) => {
    const dernierJour = new Date(an, mois + 1, 0).getDate();
    return new Date(an, mois, Math.min(jour, dernierJour));
  };
  let d = construire(t.getFullYear(), t.getMonth());
  if (d < t) d = construire(t.getFullYear(), t.getMonth() + 1);
  return d;
};

function KhairaFinances() {

          if (parsed?.profil?.pin) setVerrou(true);

    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    setSaveState("…");
    const t = setTimeout(async () => {
      try {
        await window.storage.set("khaira-finances-v2", JSON.stringify(data));
        setSaveState("ok");
      } catch (e) { setSaveState("err"); }
    }, 700);
    return () => clearTimeout(t);
  }, [data, loaded]);

  const maj = (patch) => setData((d) => ({ ...d, ...patch }));

  /* ----- calculs globaux ----- */
  const revenuMensuel = (data.profil.paieNette * 26) / 12;
  const detteTotale = data.dettes.reduce((s, d) => s + d.solde, 0);
  const minimumsCartes = data.dettes.filter((d) => d.dansBudget && d.solde > 0).reduce((s, d) => s + (d.minimum || 0), 0);
  const paiementsHorsBudget = data.dettes.filter((d) => !d.dansBudget && d.solde > 0).reduce((s, d) => s + (d.paiement || 0), 0);

  const utilisationGlobale = cartesLimitees.length
    ? (cartesLimitees.reduce((s, d) => s + d.solde, 0) / cartesLimitees.reduce((s, d) => s + d.limite, 0)) * 100
    : 0;
  const investTotal = data.investissements.reduce((s, a) => s + a.solde, 0);
  const enveloppesTotal = data.enveloppes.reduce((s, e) => s + e.solde, 0);
  const actifs = investTotal + enveloppesTotal + (data.regime.estimationActuelle || 0) + (data.fils.reee.solde || 0);
  const valeurNette = actifs - detteTotale;

  const depensesMois = useMemo(
    () => data.depenses.filter((t) => t.date?.startsWith(moisKey())),
    [data.depenses]
  );
  const totalDepensesMois = depensesMois.reduce((s, t) => s + t.montant, 0);
  const depensesCarteMois = depensesMois.filter((t) => t.carte).reduce((s, t) => s + t.montant, 0);

  const interetsMensuelsActuels = data.dettes.reduce((s, d) => s + (d.solde * (d.taux || 0)) / 100 / 12, 0);
  const payeCeMois = useMemo(() => {
    const m = {};
    (data.mouvements || []).filter((mv) => mv.type === "paiement" && mv.date?.startsWith(moisKey())).forEach((mv) => { m[mv.detteNom] = (m[mv.detteNom] || 0) + mv.montant; });
    return m;
  }, [data.mouvements]);
  const depCatCourant = useMemo(() => {
    const m = {};
    depensesMois.forEach((t) => { m[t.categorie] = (m[t.categorie] || 0) + t.montant; });
    return m;
  }, [depensesMois]);
  const depassements = Object.entries(data.budgets || {}).filter(([c, p]) => p > 0 && (depCatCourant[c] || 0) > p);

  /* ----- Mon fils : fusion des dépenses catégorie « Mon fils » + remboursements ----- */
  const filsViaDepenses = data.depenses.filter((t) => t.categorie === "Mon fils");
  const aRembourser = filsViaDepenses.filter((t) => t.carte && !t.rembourse);
  const aRembourserTotal = aRembourser.reduce((s, t) => s + t.montant, 0);

  /* ----- Fiscal : guide d'utilisation d'un retour d'impôt selon la situation ----- */
  const fiscal = data.fiscal || DEFAUT.fiscal;
  const guideRetour = (m) => {
    if (!m || m <= 0) return null;
    const chaude = [...data.dettes].filter((d) => d.solde > 0 && d.taux >= 15).sort((a, b) => b.taux - a.taux)[0];
    const fu = data.enveloppes.find((e) => e.nom.toLowerCase().includes("urgence"));
    if (chaude) return { titre: `Ta priorité : la dette à ${chaude.taux} % — aucun placement ne bat ce rendement garanti.`, lignes: [[`70 % → ${chaude.nom}`, m * 0.7], ["20 % → Fonds d’urgence", m * 0.2], ["10 % → plaisir (toi et ton fils)", m * 0.1]] };
    if (fu && fu.solde < revenuMensuel * 3) return { titre: "Dettes chères réglées : consolide ton coussin de sécurité.", lignes: [["60 % → Fonds d’urgence", m * 0.6], ["30 % → CELIAPP (maison 2027)", m * 0.3], ["10 % → plaisir", m * 0.1]] };
    return { titre: "Situation saine : chaque dollar travaille pour la maison 2027.", lignes: [["60 % → CELIAPP", m * 0.6], ["30 % → CELI", m * 0.3], ["10 % → plaisir", m * 0.1]] };
  };

  const contributionsMensInvest = data.investissements.reduce(
    (s, a) => s + (a.freq === "paie" ? (a.contribution * 26) / 12 : a.freq === "mois" ? a.contribution : 0), 0

                      <button className="kh-btn kh-btn-mini" onClick={() => { const m = parseFloat(prompt("Montant à retirer :") || 0); if (m) majEnv(e.id, { solde: Math.max(0, e.solde - m) }); }}>− Retirer</button>
                    </div>
                    <Champ type="text" label="Note" value={e.note || ""} onChange={(v) => majEnv(e.id, { note: v })} w={220} />
                  </Carte>
                );
              })}
              <button className="kh-btn kh-ajout-env" onClick={() => maj({ enveloppes: [...data.enveloppes, { id: uid(), nom: "Nouvelle enveloppe", objectif: 1000, solde: 0, mensuel: 50, note: "" }] })}>+ Nouvelle enveloppe</button>
            </div>
          </>
        )}
      </main>

      <footer className="kh-footer">
        <Tissage />
        <p>KHAIRA · Capital — construit pour {data.profil.prenom}. « La richesse n’est pas l’abondance des biens, mais la richesse de l’âme. » Tes données restent sauvegardées ici, dans cette application.</p>
      </footer>
    </div>
  );
}
